name: test

on:
  workflow_dispatch:
    inputs:
      fuzztime:
        description: How long to run the fuzz target (e.g. 10s, 5m)
        required: false
        default: 10s

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install bun dependencies
        working-directory: suts/js-algorand-sdk
        run: bun install --frozen-lockfile

      - name: Run tests
        run: go test -v ./...

      - name: Fuzz
        run: go test -run '^$' -fuzz '^FuzzCurveCheck$' -fuzztime '${{ inputs.fuzztime }}'
